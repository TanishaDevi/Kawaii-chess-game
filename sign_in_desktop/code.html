        .tertiary-bubbly {

            color: #4f4449;
            box-shadow: 0 4px 0 0 #d3c2c9;
            border: 2px solid #e7e1de;
        }
        .tertiary-bubbly:active {

        }

        .recessed-input {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.05);
        }

        .floating-mascot {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: sparkle-anim 1.5s linear forwards;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(180deg); opacity: 0; }

<script>
        // Micro-interaction: Sparkles on click
        document.addEventListener('mousedown', function(e) {
            for (let i = 0; i < 3; i++) {
                createSparkle(e.pageX, e.pageY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 10 + 5;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            
            const colorArr = ['#ffc2e2', '#ffd8eb', '#f1b5d5', '#ffffff'];
            sparkle.style.backgroundColor = colorArr[Math.floor(Math.random() * colorArr.length)];
            
            sparkle.style.left = (x - size/2) + 'px';
            sparkle.style.top = (y - size/2) + 'px';
            
            const destinationX = (Math.random() - 0.5) * 100;
            const destinationY = (Math.random() - 0.5) * 100;
            
            sparkle.animate([
                { transform: 'translate(0, 0) scale(0)', opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px) scale(1)`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 500,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            }).onfinish = () => sparkle.remove();
            
            document.body.appendChild(sparkle);
        }

        // Focus ring visual enhancement
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });
    </script>
