<style>
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .sparkle { position: absolute; width: 10px; height: 10px; background: #ffd8eb; border-radius: 50%; animation: sparkle 2s infinite; }

            box-shadow: 0 4px 0 #653853;
            transition: all 0.1s ease;
        }
        .kawaii-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #653853;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

<script>
        // Confetti Creation
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#7f4f6b', '#6252a3', '#006b5c', '#ffc2e2', '#ffd8eb'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                confetti.style.opacity = Math.random();
                container.appendChild(confetti);
                
                // Remove confetti after animation finishes
                confetti.addEventListener('animationend', () => confetti.remove());
            }
        }

        // Initialize sparkles and confetti
        window.onload = () => {
            createConfetti();
            // Periodically add more confetti
            setInterval(createConfetti, 4000);
        };

        // Micro-interaction: button click effect
        const mainBtn = document.querySelector('.kawaii-button');
        if(mainBtn) {
            mainBtn.addEventListener('click', () => {
                mainBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    mainBtn.style.transform = '';
                }, 100);
            });
        }
    </script>
