<script>
        // Simple confetti generator
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ffd8eb', '#ffc2e2', '#8ce3d0', '#b8a7ff', '#ffd8eb'];
            const shapes = ['circle', 'square'];

            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = 3 + Math.random() * 3;
                const delay = Math.random() * 2;
                const size = 8 + Math.random() * 8;

                confetti.classList.add('confetti');
                confetti.style.left = `${left}%`;
                confetti.style.top = `-20px`;
                confetti.style.backgroundColor = color;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(confetti);

                confetti.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 0.8 },
                    { transform: `translate(${(Math.random() - 0.5) * 200}px, ${window.innerHeight + 20}px) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    iterations: Infinity,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
            }
        }

        // Initialize confetti on load
        window.addEventListener('load', createConfetti);

        // Simple haptic-like vibration simulation for the button
        const awesomeBtn = document.querySelector('button');
        awesomeBtn.addEventListener('click', () => {
            awesomeBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                awesomeBtn.style.transform = '';
                // Optional: redirect or close modal logic here
            }, 100);
        });
    </script>
