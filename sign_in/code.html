<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fef8f4;
            background-image: radial-gradient(#ffd8eb 0.5px, transparent 0.5px), radial-gradient(#ffd8eb 0.5px, #fef8f4 0.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            overflow-x: hidden;
        }

        .kawaii-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10l2 4h-4l2-4zm-15 30l2 4h-4l2-4zm30 0l2 4h-4l2-4z' fill='%237f4f6b' fill-opacity='0.1'/%3E%3Ccircle cx='45' cy='15' r='2' fill='%237f4f6b' fill-opacity='0.1'/%3E%3C/svg%3E");
        }

        .neomorphic-button {
            box-shadow: 0 4px 0 #653853;
            transition: all 0.1s ease-in-out;
        }

        .neomorphic-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #653853;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 4px solid #ffffff;
        }

        .floating-mascot {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: twinkle 1.5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<style>

</div>
<!-- Background Decorative Elements -->

<div class="absolute -bottom-8 -left-4 w-32 h-32 bg-secondary-container rounded-full opacity-50 blur-xl"></div>
</div>
<div class="mt-8 text-center">
<h1 class="font-display-lg text-headline-lg text-primary mb-2">Kawaii Chess</h1>

</div>
<!-- Right Side: Sign-In Form -->

</button>
</div>
<!-- Sign Up Link -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New player? 
                        <a class="text-on-secondary-fixed-variant font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    const icon = input.previousElementSibling;
                    if (icon && icon.classList.contains('material-symbols-outlined')) {
                        icon.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                        icon.style.transform = 'translateY(-50%) scale(1.2)';
                    }
                });
                input.addEventListener('blur', () => {
                    const icon = input.previousElementSibling;
                    if (icon && icon.classList.contains('material-symbols-outlined')) {
                        icon.style.transform = 'translateY(-50%) scale(1)';
                    }
                });
            });

            // Random sparkle positioning on refresh
            const sparkles = document.querySelectorAll('.sparkle');
            sparkles.forEach(s => {
                s.style.top = Math.random() * 90 + '%';
                s.style.left = Math.random() * 90 + '%';
            });
        });
    </script>
