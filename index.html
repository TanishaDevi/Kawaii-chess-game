<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fef8f4;
            overflow-x: hidden;
        }

        .kawaii-shadow {
            box-shadow: 0 16px 32px rgba(127, 79, 107, 0.12);
        }

        .kawaii-button {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom-width: 4px;
        }

        .kawaii-button:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            aspect-ratio: 1 / 1;
            padding: 8px;
            background-color: #ede7e3;
            border-radius: 1.5rem;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        .tile {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .tile-light { background-color: #fef8f4; }
        .tile-dark { background-color: #8ce3d0; opacity: 0.8; }

        .chess-piece {
            width: 85%;
            height: 85%;
            object-fit: contain;
            cursor: grab;
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .chess-piece:hover {
            transform: scale(1.1) translateY(-4px);
        }

        .captured-circle {
            width: 32px;
            height: 32px;
            border-radius: 9999px;
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffd8eb;
            box-shadow: 0 2px 4px rgba(127,79,107,0.1);
        }

        .timer-badge {
            background-color: #ffc2e2;
            color: #7b4c67;
            padding: 8px 16px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            box-shadow: 0 4px 0 #7b4c67;
        }

        .avatar-frame {
            border: 4px solid #ffd8eb;
            position: relative;
        }

        .status-heart {
            position: absolute;
            bottom: -2px;
            right: -2px;
            font-size: 14px;
            color: #ffdad6;
            background: #ba1a1a;
            border-radius: 50%;
            padding: 2px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>

<script>
        // Micro-interactions for the chess board
        document.querySelectorAll('.tile').forEach(tile => {
            tile.addEventListener('mousedown', function() {
                if (this.querySelector('.chess-piece')) {
                    this.classList.add('scale-95');
                }
            });
            tile.addEventListener('mouseup', function() {
                this.classList.remove('scale-95');
            });
            tile.addEventListener('click', function() {
                // Remove highlight from all others
                document.querySelectorAll('.tile').forEach(t => t.classList.remove('ring-4', 'ring-primary-container'));
                
                if (this.querySelector('.chess-piece')) {
                    this.classList.add('ring-4', 'ring-primary-container');
                }
            });
        });

        // Atmospheric heart sparkle effect
        function createSparkle() {
            const sparkle = document.createElement('span');
            sparkle.classList.add('material-symbols-outlined', 'absolute', 'pointer-events-none', 'text-primary-container');
            sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
            sparkle.style.left = Math.random() * window.innerWidth + 'px';
            sparkle.style.top = window.innerHeight + 'px';
            sparkle.style.opacity = '0.6';
            sparkle.innerText = 'favorite';
            sparkle.style.transition = `all ${Math.random() * 3 + 2}s linear`;
            
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.style.transform = `translateY(-${window.innerHeight + 100}px) rotate(${Math.random() * 360}deg)`;
                sparkle.style.opacity = '0';
            }, 100);
            
            setTimeout(() => {
                sparkle.remove();
            }, 5000);
        }

        setInterval(createSparkle, 2000);
    </script>
